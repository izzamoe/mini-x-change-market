# nginx.conf — reverse proxy for mini-exchange horizontal scaling
#
# Routing strategy:
#   - WebSocket (/ws)  → ip_hash upstream so a client always hits the same
#                         instance (sticky sessions).  Required because the WS
#                         hub is per-instance; NATS fan-out ensures every
#                         instance still delivers events to its local clients.
#   - REST API (/api/) → round-robin; any instance handles any REST request.
#   - Health check      → round-robin; used by load-balancer health probes.
#
# Upstream names must match the service names in docker-compose.scaled.yml.

worker_processes auto;

events {
    worker_connections 4096;
}

http {
    # ── Upstream definitions ─────────────────────────────────────────────────

    # WebSocket upstream: ip_hash pins each client to one instance.
    upstream ws_backend {
        ip_hash;
        server app-1:8080;
        server app-2:8080;
        server app-3:8080;
    }

    # REST / health upstream: round-robin distributes load evenly.
    upstream api_backend {
        server app-1:8080;
        server app-2:8080;
        server app-3:8080;
    }

    # ── Logging ──────────────────────────────────────────────────────────────

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;
    error_log   /var/log/nginx/error.log   warn;

    # ── Connection / timeout settings ────────────────────────────────────────

    keepalive_timeout  65;
    proxy_read_timeout 300s;   # long enough for WebSocket idle connections
    proxy_send_timeout 60s;
    proxy_connect_timeout 5s;

    # ── Server block ─────────────────────────────────────────────────────────

    server {
        listen 80;
        server_name _;

        # WebSocket endpoint — sticky via ip_hash upstream
        location /ws {
            proxy_pass         http://ws_backend;
            proxy_http_version 1.1;

            # Required headers for WebSocket upgrade handshake
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "Upgrade";

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;

            # Disable buffering so frames are forwarded immediately
            proxy_buffering off;
        }

        # REST API — round-robin
        location /api/ {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host               $host;
            proxy_set_header X-Real-IP          $remote_addr;
            proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto  $scheme;
        }

        # Health check — round-robin
        location /healthz {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
        }

        # Metrics (Prometheus scrape) — round-robin
        location /metrics {
            proxy_pass         http://api_backend;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
        }
    }
}
